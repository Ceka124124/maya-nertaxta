<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎲 3D Nərd Oyunu</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="/socket.io/socket.io.js"></script>
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #f0d080;
    --deep-red: #8b1a1a;
    --dark-wood: #2a1506;
    --cream: #f5ead0;
    --dark-bg: #0d0805;
    --panel-bg: rgba(20, 10, 3, 0.92);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark-bg);
    font-family: 'Crimson Text', serif;
    color: var(--cream);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* LOBBY */
  #lobby {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, #1a0a02 0%, #0d0805 70%);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    flex-direction: column;
    gap: 0;
  }

  .lobby-card {
    background: var(--panel-bg);
    border: 1px solid var(--gold);
    border-radius: 4px;
    padding: 48px 56px;
    max-width: 480px;
    width: 90%;
    box-shadow: 0 0 80px rgba(201,168,76,0.15), inset 0 1px 0 rgba(201,168,76,0.3);
    position: relative;
  }

  .lobby-card::before {
    content: '';
    position: absolute;
    inset: 6px;
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 2px;
    pointer-events: none;
  }

  .game-title {
    font-family: 'Cinzel', serif;
    font-size: 42px;
    font-weight: 900;
    color: var(--gold);
    text-align: center;
    letter-spacing: 6px;
    text-shadow: 0 0 30px rgba(201,168,76,0.5);
    margin-bottom: 6px;
  }

  .game-subtitle {
    font-family: 'Crimson Text', serif;
    font-style: italic;
    color: rgba(245,234,208,0.5);
    text-align: center;
    font-size: 15px;
    letter-spacing: 3px;
    margin-bottom: 40px;
  }

  .lobby-section {
    margin-bottom: 24px;
  }

  .lobby-label {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--gold);
    opacity: 0.7;
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .lobby-input {
    width: 100%;
    background: rgba(201,168,76,0.05);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 2px;
    padding: 12px 16px;
    color: var(--cream);
    font-family: 'Crimson Text', serif;
    font-size: 16px;
    outline: none;
    transition: border-color 0.3s;
  }

  .lobby-input:focus {
    border-color: var(--gold);
    background: rgba(201,168,76,0.08);
  }

  .lobby-input::placeholder { color: rgba(245,234,208,0.3); }

  .btn-primary {
    width: 100%;
    background: linear-gradient(135deg, #8b6914, var(--gold), #a07820);
    border: none;
    border-radius: 2px;
    padding: 14px;
    color: var(--dark-bg);
    font-family: 'Cinzel', serif;
    font-size: 13px;
    font-weight: 900;
    letter-spacing: 4px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.3s;
    box-shadow: 0 4px 20px rgba(201,168,76,0.3);
  }

  .btn-primary:hover {
    box-shadow: 0 4px 30px rgba(201,168,76,0.5);
    transform: translateY(-1px);
  }

  .divider {
    display: flex; align-items: center; gap: 16px;
    margin: 20px 0;
    color: rgba(245,234,208,0.3);
    font-size: 12px;
    letter-spacing: 3px;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1;
    height: 1px;
    background: rgba(201,168,76,0.2);
  }

  /* GAME UI */
  #game-ui { display: none; height: 100vh; flex-direction: column; }

  #header {
    background: var(--panel-bg);
    border-bottom: 1px solid rgba(201,168,76,0.3);
    padding: 10px 24px;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }

  .header-logo {
    font-family: 'Cinzel', serif;
    font-size: 20px;
    font-weight: 900;
    color: var(--gold);
    letter-spacing: 4px;
  }

  .player-panels {
    display: flex; gap: 24px; align-items: center;
  }

  .player-panel {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 16px;
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 2px;
    background: rgba(201,168,76,0.04);
    transition: all 0.3s;
  }

  .player-panel.active {
    border-color: var(--gold);
    background: rgba(201,168,76,0.12);
    box-shadow: 0 0 15px rgba(201,168,76,0.2);
  }

  .player-chip {
    width: 18px; height: 18px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.3);
  }

  .player-chip.white { background: #f0ead0; }
  .player-chip.black { background: #1a0a02; border-color: rgba(201,168,76,0.5); }

  .player-name {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--cream);
  }

  .bore-count {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    color: var(--gold);
  }

  #main-area {
    display: flex; flex: 1; overflow: hidden;
  }

  #canvas-container {
    flex: 1; position: relative;
  }

  #three-canvas {
    width: 100%; height: 100%;
    display: block;
  }

  #side-panel {
    width: 220px;
    background: var(--panel-bg);
    border-left: 1px solid rgba(201,168,76,0.2);
    display: flex; flex-direction: column;
    padding: 20px 16px;
    gap: 16px;
    overflow-y: auto;
  }

  .panel-title {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--gold);
    opacity: 0.6;
    text-transform: uppercase;
  }

  .status-box {
    background: rgba(201,168,76,0.06);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 2px;
    padding: 14px;
    text-align: center;
  }

  .status-text {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    color: var(--cream);
    letter-spacing: 1px;
    line-height: 1.6;
  }

  .dice-display {
    display: flex; gap: 8px; justify-content: center;
    flex-wrap: wrap;
  }

  .die {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, #f5ead0, #e8d5a0);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.8);
    color: #1a0a02;
    font-weight: bold;
    transition: all 0.3s;
    position: relative;
  }

  .die.used {
    opacity: 0.3;
    transform: scale(0.85);
  }

  .die-dot {
    position: absolute;
    width: 7px; height: 7px;
    background: #1a0a02;
    border-radius: 50%;
  }

  .btn-action {
    width: 100%;
    background: linear-gradient(135deg, var(--deep-red), #6b1212);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 2px;
    padding: 12px;
    color: var(--gold-light);
    font-family: 'Cinzel', serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.3s;
    text-transform: uppercase;
  }

  .btn-action:hover { filter: brightness(1.2); transform: translateY(-1px); }
  .btn-action:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  .btn-gold {
    background: linear-gradient(135deg, #8b6914, var(--gold), #a07820);
    color: var(--dark-bg);
  }

  .log-box {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-height: 80px;
    max-height: 200px;
  }

  .log-entry {
    font-size: 12px;
    color: rgba(245,234,208,0.5);
    padding: 3px 0;
    border-bottom: 1px solid rgba(201,168,76,0.06);
    font-style: italic;
  }

  .log-entry.important { color: var(--gold-light); font-style: normal; }

  /* OVERLAY */
  #overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 50;
    align-items: center;
    justify-content: center;
  }

  #overlay.show { display: flex; }

  .overlay-card {
    background: var(--panel-bg);
    border: 1px solid var(--gold);
    border-radius: 4px;
    padding: 48px;
    text-align: center;
    max-width: 400px;
  }

  .overlay-title {
    font-family: 'Cinzel', serif;
    font-size: 32px;
    font-weight: 900;
    color: var(--gold);
    margin-bottom: 12px;
    text-shadow: 0 0 20px rgba(201,168,76,0.5);
  }

  .overlay-subtitle {
    color: rgba(245,234,208,0.7);
    font-size: 16px;
    margin-bottom: 32px;
    font-style: italic;
  }

  .waiting-spinner {
    width: 40px; height: 40px;
    border: 2px solid rgba(201,168,76,0.2);
    border-top-color: var(--gold);
    border-radius: 50%;
    margin: 20px auto;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Tooltip */
  #tooltip {
    position: fixed;
    background: rgba(20,10,3,0.95);
    border: 1px solid var(--gold);
    border-radius: 2px;
    padding: 6px 12px;
    font-family: 'Cinzel', serif;
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 2px;
    pointer-events: none;
    display: none;
    z-index: 200;
  }

  #room-info {
    font-size: 11px;
    color: rgba(245,234,208,0.4);
    letter-spacing: 1px;
    font-family: 'Cinzel', serif;
  }
</style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby">
  <div class="lobby-card">
    <div class="game-title">NƏRD</div>
    <div class="game-subtitle">Klassik Zər Oyunu</div>

    <div class="lobby-section">
      <div class="lobby-label">Adınız</div>
      <input class="lobby-input" id="playerName" type="text" placeholder="Adınızı daxil edin" maxlength="20">
    </div>

    <div class="lobby-section">
      <div class="lobby-label">Otaq Kodu</div>
      <input class="lobby-input" id="roomId" type="text" placeholder="Otaq kodu (məs: nard123)" maxlength="20">
    </div>

    <button class="btn-primary" onclick="joinGame()">OYUNA QOŞUL</button>

    <div class="divider">və ya</div>

    <button class="btn-primary" style="background: linear-gradient(135deg,#2a1a02,#3a2506); color: var(--gold);" onclick="quickJoin()">
      SÜRƏTLI BAŞLA
    </button>
  </div>
</div>

<!-- GAME UI -->
<div id="game-ui">
  <div id="header">
    <div class="header-logo">🎲 NƏRD</div>
    <div class="player-panels">
      <div class="player-panel" id="panel-white">
        <div class="player-chip white"></div>
        <div class="player-name" id="white-name">Ağ</div>
        <div class="bore-count" id="white-bore">✓ 0</div>
      </div>
      <div style="color:rgba(201,168,76,0.3); font-family:'Cinzel',serif; font-size:12px">VS</div>
      <div class="player-panel" id="panel-black">
        <div class="player-chip black"></div>
        <div class="player-name" id="black-name">Qara</div>
        <div class="bore-count" id="black-bore">✓ 0</div>
      </div>
    </div>
    <div id="room-info"></div>
  </div>

  <div id="main-area">
    <div id="canvas-container">
      <canvas id="three-canvas"></canvas>
    </div>
    <div id="side-panel">
      <div class="panel-title">Oyun Durumu</div>
      <div class="status-box">
        <div class="status-text" id="status-text">Gözlənilir...</div>
      </div>

      <div class="panel-title">Zərlər</div>
      <div class="dice-display" id="dice-display"></div>

      <button class="btn-action btn-gold" id="btn-roll" onclick="rollDice()" disabled>🎲 ZƏR AT</button>
      <button class="btn-action" id="btn-skip" onclick="skipTurn()" disabled>→ Növbəni keç</button>

      <div class="panel-title">Oyun Jurnalı</div>
      <div class="log-box" id="log-box"></div>
    </div>
  </div>
</div>

<!-- OVERLAY -->
<div id="overlay">
  <div class="overlay-card">
    <div class="overlay-title" id="overlay-title">Gözlənilir</div>
    <div class="waiting-spinner" id="overlay-spinner"></div>
    <div class="overlay-subtitle" id="overlay-subtitle">Rəqib axtarılır...</div>
    <button class="btn-action btn-gold" id="overlay-btn" style="display:none" onclick="playAgain()">YENİDƏN OYNA</button>
  </div>
</div>

<div id="tooltip"></div>

<script>
// =====================
// SOCKET & STATE
// =====================
const socket = io();
let myColor = null;
let myName = '';
let currentRoomId = '';
let gameState = null;
let players = {};

// Three.js vars
let scene, camera, renderer, raycaster, mouse;
let boardMeshes = [];
let pieceMeshes = [];
let pointObjects = [];
let selectedMesh = null;
let animating = false;

function joinGame() {
  const name = document.getElementById('playerName').value.trim() || 'Oyunçu';
  const room = document.getElementById('roomId').value.trim() || 'default';
  myName = name;
  currentRoomId = room;
  socket.emit('joinRoom', { roomId: room, playerName: name });
  showOverlay('Gözlənilir', 'Rəqib axtarılır...');
}

function quickJoin() {
  document.getElementById('roomId').value = 'room_' + Math.random().toString(36).substr(2, 6);
  joinGame();
}

// =====================
// SOCKET EVENTS
// =====================
socket.on('joined', ({ color, roomId }) => {
  myColor = color;
  currentRoomId = roomId;
  document.getElementById('room-info').textContent = 'Otaq: ' + roomId;
});

socket.on('waiting', () => {
  showOverlay('Gözlənilir', 'Rəqib bağlanana qədər bu kodu dostunuzla paylaşın: ' + currentRoomId);
});

socket.on('gameStart', ({ game, players: pl }) => {
  gameState = game;
  players = {};
  pl.forEach(p => players[p.color] = p.name);
  document.getElementById('white-name').textContent = players.white || 'Ağ';
  document.getElementById('black-name').textContent = players.black || 'Qara';

  hideOverlay();
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('game-ui').style.display = 'flex';

  if (!renderer) initThreeJS();
  updateScene();
  updateUI();
  addLog('Oyun başladı! ' + (players.white) + ' vs ' + (players.black), true);
});

socket.on('diceRolled', ({ game }) => {
  gameState = game;
  updateScene();
  updateUI();
  addLog(`${players[game.currentPlayer]} zər atdı: ${game.dice.join(' & ')}`);
});

socket.on('pointSelected', ({ game }) => {
  gameState = game;
  updateScene();
});

socket.on('moveMade', ({ game }) => {
  gameState = game;
  updateScene();
  updateUI();
});

socket.on('turnSkipped', ({ game }) => {
  gameState = game;
  updateScene();
  updateUI();
  addLog('Növbə keçirildi');
});

socket.on('playerLeft', ({ message }) => {
  addLog(message, true);
  showOverlay('Oyunçu ayrıldı', message);
});

socket.on('roomFull', ({ message }) => {
  alert(message);
});

socket.on('gameStart', ({ game, players: pl }) => {
  // handled above - second registration skipped
});

// =====================
// GAME ACTIONS
// =====================
function rollDice() {
  if (!gameState || gameState.currentPlayer !== myColor) return;
  socket.emit('rollDice', { roomId: currentRoomId });
}

function skipTurn() {
  if (!gameState || gameState.currentPlayer !== myColor) return;
  socket.emit('skipTurn', { roomId: currentRoomId });
}

function playAgain() {
  socket.emit('playAgain', { roomId: currentRoomId });
  hideOverlay();
}

function selectPoint(pointIndex) {
  if (!gameState || gameState.currentPlayer !== myColor || gameState.phase !== 'moving') return;
  socket.emit('selectPoint', { roomId: currentRoomId, point: pointIndex });
}

function makeMove(from, to) {
  socket.emit('makeMove', { roomId: currentRoomId, from, to });
}

// =====================
// UI HELPERS
// =====================
function updateUI() {
  if (!gameState) return;

  const isMyTurn = gameState.currentPlayer === myColor;
  const phase = gameState.phase;

  let statusText = '';
  if (phase === 'gameover') {
    const winnerName = players[gameState.winner] || gameState.winner;
    statusText = `🏆 ${winnerName} QAZANDI!`;
    showOverlay('🏆 Qaliblər', `${winnerName} oyunu qazandı!`, true);
  } else if (isMyTurn) {
    statusText = phase === 'rolling' ? '🎲 Zər atma vaxtınız!' : '♟ Daş hərəkət etdirin';
  } else {
    const oppName = players[gameState.currentPlayer] || 'Rəqib';
    statusText = `${oppName} oynayır...`;
  }

  document.getElementById('status-text').textContent = statusText;
  document.getElementById('btn-roll').disabled = !(isMyTurn && phase === 'rolling');
  document.getElementById('btn-skip').disabled = !(isMyTurn && phase === 'moving' && gameState.movesLeft.length > 0);

  document.getElementById('white-bore').textContent = '✓ ' + (gameState.whiteBorne || 0);
  document.getElementById('black-bore').textContent = '✓ ' + (gameState.blackBorne || 0);

  document.getElementById('panel-white').classList.toggle('active', gameState.currentPlayer === 'white');
  document.getElementById('panel-black').classList.toggle('active', gameState.currentPlayer === 'black');

  // Dice display
  const diceEl = document.getElementById('dice-display');
  diceEl.innerHTML = '';
  if (gameState.dice && gameState.dice.length) {
    const allDice = gameState.dice[0] === gameState.dice[1]
      ? [gameState.dice[0], gameState.dice[0], gameState.dice[0], gameState.dice[0]]
      : gameState.dice;

    allDice.forEach((d, i) => {
      const used = i >= gameState.movesLeft.length ||
        (gameState.movesLeft.filter(x => x === d).length < allDice.filter((x, j) => x === d && j <= i).length);
      const die = document.createElement('div');
      die.className = 'die' + (used ? ' used' : '');
      die.textContent = getDiceEmoji(d);
      diceEl.appendChild(die);
    });
  }
}

function getDiceEmoji(n) {
  return ['⚀','⚁','⚂','⚃','⚄','⚅'][n-1];
}

function addLog(text, important = false) {
  const box = document.getElementById('log-box');
  const entry = document.createElement('div');
  entry.className = 'log-entry' + (important ? ' important' : '');
  entry.textContent = text;
  box.insertBefore(entry, box.firstChild);
  if (box.children.length > 30) box.removeChild(box.lastChild);
}

function showOverlay(title, subtitle, isEnd = false) {
  document.getElementById('overlay-title').textContent = title;
  document.getElementById('overlay-subtitle').textContent = subtitle;
  document.getElementById('overlay-spinner').style.display = isEnd ? 'none' : 'block';
  document.getElementById('overlay-btn').style.display = isEnd ? 'block' : 'none';
  document.getElementById('overlay').classList.add('show');
}

function hideOverlay() {
  document.getElementById('overlay').classList.remove('show');
}

// =====================
// THREE.JS 3D BOARD
// =====================
const BOARD_W = 12;
const BOARD_H = 7;
const POINT_W = 0.85;
const POINT_H = 2.8;
const PIECE_R = 0.38;
const PIECE_H = 0.18;

const POINT_POSITIONS = [];
// Points 0-11: bottom row (right to left when white)
// Points 12-23: top row (left to right)
function calcPointPos(idx) {
  if (idx < 6) {
    // Bottom right: 0=rightmost
    const x = (5 - idx) * POINT_W - BOARD_W/2 + POINT_W/2 + 0.5;
    return { x, y: -BOARD_H/2, side: 'bottom' };
  } else if (idx < 12) {
    // Bottom left
    const x = (11 - idx) * POINT_W - BOARD_W/2 + POINT_W/2 - 0.5;
    return { x: x - 0.5, y: -BOARD_H/2, side: 'bottom' };
  } else if (idx < 18) {
    // Top left
    const x = (idx - 12) * POINT_W - BOARD_W/2 + POINT_W/2 - 0.5;
    return { x: x - 0.5, y: BOARD_H/2, side: 'top' };
  } else {
    // Top right
    const x = (idx - 18) * POINT_W - BOARD_W/2 + POINT_W/2 + 0.5;
    return { x, y: BOARD_H/2, side: 'top' };
  }
}

function initThreeJS() {
  const canvas = document.getElementById('three-canvas');
  const container = document.getElementById('canvas-container');

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0d0805);
  scene.fog = new THREE.Fog(0x0d0805, 20, 40);

  camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
  camera.position.set(0, 10, 8);
  camera.lookAt(0, 0, 0);

  renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setSize(container.clientWidth, container.clientHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;

  raycaster = new THREE.Raycaster();
  mouse = new THREE.Vector2();

  // Lighting
  const ambient = new THREE.AmbientLight(0x3a2008, 0.8);
  scene.add(ambient);

  const mainLight = new THREE.DirectionalLight(0xffd080, 1.5);
  mainLight.position.set(3, 10, 5);
  mainLight.castShadow = true;
  mainLight.shadow.mapSize.width = 2048;
  mainLight.shadow.mapSize.height = 2048;
  scene.add(mainLight);

  const fillLight = new THREE.PointLight(0x6020a0, 0.4, 20);
  fillLight.position.set(-5, 3, -3);
  scene.add(fillLight);

  const rimLight = new THREE.PointLight(0xc9a84c, 0.6, 15);
  rimLight.position.set(0, 5, -6);
  scene.add(rimLight);

  buildBoard();

  // Mouse events
  canvas.addEventListener('mousemove', onMouseMove);
  canvas.addEventListener('click', onMouseClick);

  // Resize
  window.addEventListener('resize', () => {
    camera.aspect = container.clientWidth / container.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(container.clientWidth, container.clientHeight);
  });

  animate();
}

function buildBoard() {
  // Board base (dark wood)
  const boardGeo = new THREE.BoxGeometry(BOARD_W + 1, 0.3, BOARD_H + 1);
  const boardMat = new THREE.MeshStandardMaterial({
    color: 0x1a0800, roughness: 0.85, metalness: 0.1
  });
  const board = new THREE.Mesh(boardGeo, boardMat);
  board.position.y = -0.15;
  board.receiveShadow = true;
  scene.add(board);

  // Board surface (felt green)
  const surfGeo = new THREE.PlaneGeometry(BOARD_W - 0.1, BOARD_H - 0.1);
  const surfMat = new THREE.MeshStandardMaterial({ color: 0x1a3310, roughness: 0.95 });
  const surf = new THREE.Mesh(surfGeo, surfMat);
  surf.rotation.x = -Math.PI / 2;
  surf.receiveShadow = true;
  scene.add(surf);

  // Middle bar
  const barGeo = new THREE.BoxGeometry(0.5, 0.35, BOARD_H);
  const barMat = new THREE.MeshStandardMaterial({ color: 0x2a1200, roughness: 0.7 });
  const bar = new THREE.Mesh(barGeo, barMat);
  bar.position.y = 0.02;
  scene.add(bar);

  // Border frame
  const frameMat = new THREE.MeshStandardMaterial({
    color: 0x3d1f08, roughness: 0.6, metalness: 0.2
  });
  [
    [0, 0.18, -(BOARD_H/2+0.25), BOARD_W+1, 0.36, 0.5],
    [0, 0.18, (BOARD_H/2+0.25), BOARD_W+1, 0.36, 0.5],
    [-(BOARD_W/2+0.25), 0.18, 0, 0.5, 0.36, BOARD_H+1],
    [(BOARD_W/2+0.25), 0.18, 0, 0.5, 0.36, BOARD_H+1],
  ].forEach(([x,y,z,w,h,d]) => {
    const g = new THREE.BoxGeometry(w,h,d);
    const m = new THREE.Mesh(g, frameMat);
    m.position.set(x,y,z);
    m.castShadow = true;
    scene.add(m);
  });

  // Draw points (triangles)
  for (let i = 0; i < 24; i++) {
    const pos = calcPointPos(i);
    const isEven = i % 2 === 0;
    const color = isEven ? 0x8b1a1a : 0xc9a84c;
    const dir = pos.side === 'bottom' ? 1 : -1;

    const shape = new THREE.Shape();
    shape.moveTo(-POINT_W/2, 0);
    shape.lineTo(POINT_W/2, 0);
    shape.lineTo(0, dir * POINT_H);
    shape.closePath();

    const geo = new THREE.ShapeGeometry(shape);
    const mat = new THREE.MeshStandardMaterial({
      color, roughness: 0.8, metalness: 0.05, opacity: 0.9, transparent: true
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.rotation.x = -Math.PI / 2;
    mesh.position.set(pos.x, 0.01, pos.side === 'bottom' ? BOARD_H/2 - 0.05 : -BOARD_H/2 + 0.05);
    mesh.userData = { type: 'point', index: i };
    scene.add(mesh);
    pointObjects.push(mesh);

    // Hit area (invisible plane)
    const hitGeo = new THREE.PlaneGeometry(POINT_W, POINT_H);
    const hitMat = new THREE.MeshBasicMaterial({ visible: false, side: THREE.DoubleSide });
    const hit = new THREE.Mesh(hitGeo, hitMat);
    hit.rotation.x = -Math.PI / 2;
    const zOffset = dir * POINT_H/2;
    hit.position.set(pos.x, 0.02, pos.side === 'bottom'
      ? BOARD_H/2 - 0.05 - zOffset
      : -BOARD_H/2 + 0.05 - zOffset);
    hit.userData = { type: 'hitpoint', index: i };
    scene.add(hit);
    boardMeshes.push(hit);
  }

  // Bar hit area
  const barHit = new THREE.Mesh(
    new THREE.PlaneGeometry(0.5, BOARD_H),
    new THREE.MeshBasicMaterial({ visible: false })
  );
  barHit.rotation.x = -Math.PI / 2;
  barHit.position.set(0, 0.02, 0);
  barHit.userData = { type: 'bar' };
  scene.add(barHit);
  boardMeshes.push(barHit);
}

const PIECE_COLORS = {
  white: { color: 0xf5ead0, emissive: 0x1a0a00, roughness: 0.3, metalness: 0.1 },
  black: { color: 0x120503, emissive: 0x000000, roughness: 0.4, metalness: 0.15 }
};

function updateScene() {
  // Remove old pieces
  pieceMeshes.forEach(m => scene.remove(m));
  pieceMeshes = [];

  if (!gameState) return;

  // Reset point highlights
  pointObjects.forEach(p => {
    const isEven = p.userData.index % 2 === 0;
    p.material.color.setHex(isEven ? 0x8b1a1a : 0xc9a84c);
    p.material.emissive.setHex(0x000000);
  });

  // Highlight selected point
  if (gameState.selectedPoint !== null && gameState.selectedPoint !== 'bar') {
    const selPt = pointObjects.find(p => p.userData.index === gameState.selectedPoint);
    if (selPt) {
      selPt.material.emissive.setHex(0x806000);
      selPt.material.emissiveIntensity = 0.5;
    }
  }

  // Highlight valid moves
  if (gameState.validMoves) {
    gameState.validMoves.forEach(idx => {
      if (typeof idx === 'number') {
        const pt = pointObjects.find(p => p.userData.index === idx);
        if (pt) {
          pt.material.color.setHex(0x40a040);
          pt.material.emissive.setHex(0x204020);
          pt.material.emissiveIntensity = 0.4;
        }
      }
    });
  }

  // Draw pieces on board
  for (let i = 0; i < 24; i++) {
    const count = gameState.board[i];
    if (count === 0) continue;
    const color = count > 0 ? 'white' : 'black';
    const n = Math.abs(count);
    const pos = calcPointPos(i);
    const dir = pos.side === 'bottom' ? -1 : 1;

    for (let j = 0; j < n; j++) {
      const piece = createPieceMesh(color);
      const zOff = j * (PIECE_H + 0.02) * dir;
      const baseZ = pos.side === 'bottom'
        ? BOARD_H/2 - 0.5
        : -BOARD_H/2 + 0.5;
      piece.position.set(pos.x, PIECE_H/2 + 0.01 + j * (PIECE_H + 0.01), baseZ + zOff);
      piece.userData = { type: 'piece', pointIndex: i, color };
      scene.add(piece);
      pieceMeshes.push(piece);
    }
  }

  // Bar pieces
  drawBarPieces('white', gameState.whiteBar);
  drawBarPieces('black', gameState.blackBar);
}

function createPieceMesh(color) {
  const geo = new THREE.CylinderGeometry(PIECE_R, PIECE_R, PIECE_H, 32);
  const cfg = PIECE_COLORS[color];
  const mat = new THREE.MeshStandardMaterial({
    color: cfg.color,
    emissive: cfg.emissive,
    roughness: cfg.roughness,
    metalness: cfg.metalness
  });
  const m = new THREE.Mesh(geo, mat);
  m.castShadow = true;
  m.receiveShadow = true;

  // Ring detail
  const ringGeo = new THREE.TorusGeometry(PIECE_R - 0.05, 0.025, 8, 32);
  const ringMat = new THREE.MeshStandardMaterial({
    color: color === 'white' ? 0xc9a84c : 0x4a3010,
    metalness: 0.8, roughness: 0.2
  });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.position.y = PIECE_H/2;
  m.add(ring);

  return m;
}

function drawBarPieces(color, count) {
  for (let i = 0; i < count; i++) {
    const piece = createPieceMesh(color);
    const side = color === 'white' ? 1 : -1;
    piece.position.set(0, PIECE_H/2 + 0.01 + i * (PIECE_H + 0.02), side * i * 0.25);
    piece.userData = { type: 'barpiece', color };
    scene.add(piece);
    pieceMeshes.push(piece);
  }
}

// =====================
// MOUSE / INTERACTION
// =====================
function onMouseMove(e) {
  const canvas = document.getElementById('three-canvas');
  const rect = canvas.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects([...boardMeshes, ...pieceMeshes]);

  const tooltip = document.getElementById('tooltip');
  if (intersects.length) {
    const obj = intersects[0].object;
    if (obj.userData.type === 'hitpoint' || obj.userData.type === 'piece') {
      const idx = obj.userData.pointIndex ?? obj.userData.index;
      if (typeof idx === 'number') {
        const cnt = gameState?.board[idx] || 0;
        const color = cnt > 0 ? 'Ağ' : cnt < 0 ? 'Qara' : 'Boş';
        tooltip.textContent = `Xana ${idx + 1} — ${color}: ${Math.abs(cnt)}`;
        tooltip.style.display = 'block';
        tooltip.style.left = (e.clientX + 12) + 'px';
        tooltip.style.top = (e.clientY - 8) + 'px';
        return;
      }
    }
  }
  tooltip.style.display = 'none';
}

function onMouseClick(e) {
  if (!gameState || gameState.currentPlayer !== myColor || gameState.phase !== 'moving') return;

  const canvas = document.getElementById('three-canvas');
  const rect = canvas.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects([...boardMeshes, ...pieceMeshes]);
  if (!intersects.length) return;

  const obj = intersects[0].object;
  const type = obj.userData.type;

  // Bar click
  if (type === 'bar') {
    const bar = myColor === 'white' ? gameState.whiteBar : gameState.blackBar;
    if (bar > 0) selectPoint('bar');
    return;
  }

  // Bar piece click
  if (type === 'barpiece' && obj.userData.color === myColor) {
    selectPoint('bar');
    return;
  }

  // Piece click on point
  if (type === 'piece' && obj.userData.color === myColor) {
    const idx = obj.userData.pointIndex;
    if (gameState.selectedPoint === idx) return; // already selected
    selectPoint(idx);
    return;
  }

  // Hit point click
  if (type === 'hitpoint') {
    const idx = obj.userData.index;

    // Clicking a valid move
    if (gameState.selectedPoint !== null && gameState.validMoves.includes(idx)) {
      makeMove(gameState.selectedPoint, idx);
      addLog(`${players[myColor]} daşı ${gameState.selectedPoint + 1} → ${idx + 1} hərəkət etdirdi`);
      return;
    }

    // Clicking own piece to select
    const cnt = gameState.board[idx];
    const isOwnPiece = myColor === 'white' ? cnt > 0 : cnt < 0;
    if (isOwnPiece) {
      selectPoint(idx);
    }
    return;
  }
}

// =====================
// ANIMATE
// =====================
let time = 0;
function animate() {
  requestAnimationFrame(animate);
  time += 0.01;

  // Gentle camera bob
  camera.position.x = Math.sin(time * 0.1) * 0.3;
  camera.position.y = 10 + Math.sin(time * 0.15) * 0.1;
  camera.lookAt(0, 0, 0);

  renderer.render(scene, camera);
}

// Handle gameStart event (fix duplicate listener)
socket.off('gameStart');
socket.on('gameStart', ({ game, players: pl }) => {
  gameState = game;
  players = {};
  pl.forEach(p => players[p.color] = p.name);
  document.getElementById('white-name').textContent = players.white || 'Ağ';
  document.getElementById('black-name').textContent = players.black || 'Qara';
  hideOverlay();
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('game-ui').style.display = 'flex';
  if (!renderer) initThreeJS();
  updateScene();
  updateUI();
  addLog('Oyun başladı! ' + players.white + ' vs ' + players.black, true);
});
</script>
