<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>\ud83c\udfb2 N\u0259rd</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
:root{
  --wd:#5C2D0A;--wm:#8B4513;--wl:#C68642;
  --fg:#2E7D32;--gold:#D4A017;--goldf:#F0C040;
  --pr:#C0392B;--pc:#F5DEB3;
  --chat-h:155px;
}
html,body{width:100%;height:100%;overflow:hidden;background:#2C1A08;font-family:'Nunito',sans-serif;touch-action:none;}

/* ===== LOBBY ===== */
#lobby{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at center,#4a2008,#1a0800);z-index:200;gap:16px;padding:20px;overflow-y:auto;}
.l-logo{font-family:'Fredoka One',cursive;font-size:62px;color:var(--goldf);
  text-shadow:0 4px 12px rgba(0,0,0,.6),0 0 40px rgba(212,160,23,.6);letter-spacing:8px;
  animation:lpulse 2s ease-in-out infinite;}
@keyframes lpulse{0%,100%{filter:drop-shadow(0 0 12px rgba(212,160,23,.3));}50%{filter:drop-shadow(0 0 30px rgba(212,160,23,.9));}}
.l-die{font-size:36px;display:inline-block;animation:dspin 3s linear infinite;}
@keyframes dspin{to{transform:rotate(360deg);}}
.l-card{background:linear-gradient(145deg,#5c2d0a,#3a1a06);border:3px solid var(--gold);
  border-radius:20px;padding:26px 22px;width:100%;max-width:360px;
  box-shadow:0 10px 40px rgba(0,0,0,.6),inset 0 1px 0 rgba(212,160,23,.25),inset 0 -1px 0 rgba(0,0,0,.3);}
.l-label{font-size:11px;font-weight:700;color:var(--gold);letter-spacing:2px;text-transform:uppercase;
  margin-bottom:6px;display:block;}
.l-in{width:100%;padding:14px 16px;background:rgba(0,0,0,.35);border:2px solid rgba(212,160,23,.4);
  border-radius:13px;color:#f5deb3;font-family:'Nunito',sans-serif;font-size:16px;font-weight:700;outline:none;
  transition:border-color .2s;}
.l-in:focus{border-color:var(--goldf);box-shadow:0 0 0 3px rgba(212,160,23,.15);}
.l-in::placeholder{color:rgba(245,222,179,.35);}
.btn-j{width:100%;margin-top:16px;padding:16px;
  background:linear-gradient(135deg,#b07000,var(--goldf),#f5d060,#b07000);
  background-size:200% 100%;
  border:none;border-radius:14px;font-family:'Fredoka One',cursive;font-size:20px;color:#1a0800;
  cursor:pointer;box-shadow:0 5px 20px rgba(212,160,23,.5);transition:transform .1s,box-shadow .1s;
  animation:shine 3s ease-in-out infinite;}
@keyframes shine{0%,100%{background-position:0%;}50%{background-position:100%;}}
.btn-j:active{transform:scale(.97);box-shadow:0 2px 10px rgba(212,160,23,.3);}

/* ===== GAME WRAP ===== */
#gw{display:none;flex-direction:column;width:100%;height:100%;}

/* TOP BAR */
#topbar{background:linear-gradient(180deg,#3d1a06,#2a1006);border-bottom:2px solid var(--gold);
  padding:5px 10px;display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;box-shadow:0 3px 12px rgba(0,0,0,.5);}
.pbadge{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:16px;
  border:2px solid transparent;transition:all .3s;background:rgba(0,0,0,.2);min-width:0;}
.pbadge.act{border-color:var(--goldf);background:rgba(212,160,23,.18);
  box-shadow:0 0 14px rgba(212,160,23,.4);}
.chip{width:20px;height:20px;border-radius:50%;border:2px solid rgba(255,255,255,.3);box-shadow:0 2px 6px rgba(0,0,0,.6);flex-shrink:0;}
.chip.w{background:radial-gradient(circle at 38% 35%,#fff,#f0e6cc 40%,#c8a87a 100%);}
